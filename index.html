<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>中国象棋 · 人机对战</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>中国象棋 · 人机对战</h1>
      <div class="controls">
        <button id="resetBtn">重新开始</button>
        <label class="depth">
          AI 深度
          <input id="depth" type="range" min="2" max="4" step="1" value="3" />
          <span id="depthVal">3</span>
        </label>
      </div>
    </header>

    <main>
      <canvas id="board" width="540" height="600" aria-label="象棋棋盘"></canvas>
      <aside class="status">
        <div class="turn">当前回合：<span id="turn">红方</span></div>
        <div class="msg" id="msg">请走子</div>
        <div class="hint">红方（你）先走</div>
        <div class="legend">
          <div>红：帅 仕 相 马 车 炮 兵</div>
          <div>黑：将 士 象 马 车 炮 卒</div>
        </div>
      </aside>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
